<div class="item-card">
    <h2 class="item-title">{{ item.name }}</h2>

    <p class="item-description">{{ item.desc }}</p>

    <div class="item-price">
        {{ item.price|floatformat:2 }} {{ item.currency|upper }}
    </div>

    {% if not hide_button %}
        <button class="buy-btn" id="buy-button">Купить</button>
    {% endif %}
</div>
