<p>DEBUG: {{ STRIPE_PUBLIC_KEY }}</p>

<div class="item-card">
    <h2 class="item-title">{{ item.name }}</h2>

    <p class="item-description">{{ item.desc }}</p>

    <div class="item-price">
        {{ item.price|floatformat:2 }} {{ item.currency|upper }}
    </div>

    {% if not hide_button %}
        <button class="buy-btn" id="buy-button">Купить</button>
    {% endif %}
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    const stripe = Stripe("{{ STRIPE_PUBLIC_KEY }}");


    document.getElementById("buy-button")?.addEventListener("click", function () {
        fetch("{% url 'catalog:buy_item' item.id %}")
            .then(response => response.json())
            .then(data => stripe.redirectToCheckout({ sessionId: data.session_id }));
    });
</script>
