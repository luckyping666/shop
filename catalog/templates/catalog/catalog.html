{% extends "base.html" %}

{% block title %}Каталог{% endblock %}

{% block content %}
<h1>Каталог товаров</h1>

<div class="catalog-list">
    {% for item in items %}
        <a href="{% url 'catalog:item_detail' item.id %}">
            {% include "catalog/components/item_card.html" %}
        </a>
    {% empty %}
        <p>Пока нет товаров</p>
    {% endfor %}
</div>
{% endblock %}
